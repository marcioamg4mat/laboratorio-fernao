<!DOCTYPE html>

<style>

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.topo{
background:#003d99;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

.aluno{
text-align:right;
font-size:18px;
}

.caderno{
background:
repeating-linear-gradient(
to bottom,
white 0px,
white 72px,
#dbe7ff 73px,
white 74px
);
padding:40px 20px;
text-align:center;
}

.titulo1{
color:#0b47a1;
font-size:22px;
font-weight:bold;
}

.titulo2{
color:#0b47a1;
font-size:72px;
font-weight:900;
line-height:0.9;
}

.titulo3{
color:#d91f26;
font-size:54px;
font-weight:900;
}

.subtitulo{
margin-top:25px;
font-size:20px;
color:#0b47a1;
font-weight:bold;
}

.area{
background:#eceef3;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.card h2{
color:#0b47a1;
font-size:42px;
margin-bottom:10px;
}

.card p{
font-size:22px;
}

.barra{
height:20px;
background:#ddd;
border-radius:20px;
margin-top:25px;
overflow:hidden;
}

.progresso{
width:47%;
height:100%;
background:#0b47a1;
}

.fracao{
text-align:right;
font-size:24px;
font-weight:bold;
color:#0b47a1;
margin-top:10px;
}

.botao{
display:block;
text-decoration:none;
background:#d91f26;
color:white;
text-align:center;
padding:22px;
border-radius:16px;
font-size:24px;
font-weight:bold;
margin-top:20px;
}

.menu{
position:fixed;
bottom:0;
left:0;
right:0;
background:#003d99;
display:flex;
justify-content:space-around;
padding:15px;
}

.menu button{
background:none;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topo">

<div class="logo">
🏫 E.E. FERNÃO DIAS
</div>

<div class="aluno">
Márcio<br>

</div>

<div class="titulo1">
LABORATÓRIO DE
</div>

<div class="titulo2">

</div>

<div class="titulo3">

</div>

<div class="subtitulo">
Investigar • Testar • Descobrir
</div>

</div>

<div class="area">

<div class="card">

<h2>🧪 Bancada 1</h2>

<p>Movendo Números</p>

<div class="barra">
<div class="progresso"></div>
</div>

<div class="fracao">
7 / 15
</div>

</div>
