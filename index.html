<!DOCTYPE html>
<html lang="pt-br">

<head>

<title>Laboratório de Equações do Fernão</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#edf2f8;
padding-bottom:90px;
}

.app{
max-width:420px;
margin:auto;
min-height:100vh;
}

.topo{
background:#003b8f;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.brasao{
width:55px;
height:55px;
object-fit:contain;
}

.logo-texto{
font-size:18px;
font-weight:bold;
}

.aluno{
font-size:14px;
text-align:right;
line-height:1.4;
}

.caderno{
background:
repeating-linear-gradient(
white,
white 39px,
#d6e4ff 40px
);
padding:30px 15px;
text-align:center;
margin-top:10px;
border-radius:25px;
}

.caderno h2{
color:#003d99;
font-size:20px;
letter-spacing:2px;
}

.caderno h1{
color:#003d99;
font-size:58px;
line-height:.95;
margin-top:5px;
}

.caderno h3{
color:#e12626;
font-size:34px;
margin-top:5px;
}

.slogan{
margin-top:18px;
font-size:15px;
font-weight:bold;
color:#003d99;
}

.card{
background:white;
width:92%;
margin:25px auto;
padding:25px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.10);
border:2px solid #dbe7ff;
}

.card h2{
color:#0b4eb3;
font-size:26px;
margin-bottom:10px;
}

.card p{
font-size:18px;
}

.barra{
height:14px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progresso{
width:47%;
height:100%;
background:#0b4eb3;
}

.questoes{
text-align:right;
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#0b4eb3;
}

.botao{
display:block;
width:92%;
margin:20px auto;
background:#e12626;
color:white;
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
border-radius:22px;
text-decoration:none;
box-shadow:0 8px 20px rgba(225,38,38,.25);
}

.menu{
display:flex;
gap:12px;
width:92%;
margin:15px auto;
}

.caixa{
flex:1;
background:white;
padding:25px;
border-radius:20px;
text-align:center;
font-size:16px;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.08);
border:2px solid #dbe7ff;
}

.rodape{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#003b8f;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.rodape a{
color:white;
text-decoration:none;
font-size:13px;
text-align:center;
}

</style>

</head>

<body>

<div class="app">

<div class="topo">

<div class="logo-area">

<img src="brasao.png.jpg" class="brasao">

</div>

</div>

</div>

</div>

</div>

</div>
