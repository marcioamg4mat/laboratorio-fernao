<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questão 1</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:
repeating-linear-gradient(
white,
white 39px,
#d6e4ff 40px
);
min-height:100vh;
}

.topo{
background:#003d99;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.area{
text-align:center;
padding:30px 20px;
}

.equacao{
font-size:60px;
color:#003d99;
margin:40px 0;
}

.postit{
background:#fff2a8;
padding:18px;
border-radius:12px;
max-width:350px;
margin:20px auto;
font-size:20px;
}

.caixa{
width:80px;
height:40px;
font-size:28px;
text-align:center;
}

.botao{
margin-top:20px;
padding:12px 25px;
font-size:20px;
background:#003d99;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.resultado{
margin-top:25px;
font-size:24px;
font-weight:bold;
}

#passo2{
display:none;
}

#fim{
display:none;
}

</style>

</head>

<body>

<div class="topo">
⬅ Questão 1 de 15
</div>

<div class="area">

<h1>Bancada 1 - Movendo Números</h1>

<div id="passo1">

<div class="equacao">
x + 5 = 8
</div>

<div class="postit">
💡 O número 5 está somando.<br>
Faça a operação oposta.
</div>

<div class="equacao">
x = 8 (
<input id="op" class="caixa">
)
</div>

<button class="botao" onclick="verificar1()">
Verificar
</button>

</div>

<div id="passo2">

<div class="equacao">
x = 8 - 5
</div>

<div class="postit">
💡 Agora calcule o resultado.
</div>

<div class="equacao">
x =
<input id="valorx" class="caixa">
</div>

<button class="botao" onclick="verificar2()">
Verificar
</button>

</div>

<div id="fim">

<div class="equacao">
x = 3
</div>

<div class="resultado">
⭐ +20 pontos<br><br>
🏆 Questão concluída!
</div>

</div>

<div id="mensagem" class="resultado"></div>

</div>

<script>

function verificar1(){

let resposta =
document.getElementById("op").value.trim();

if(resposta == "-5"){

document.getElementById("passo1").style.display="none";
document.getElementById("passo2").style.display="block";
document.getElementById("mensagem").innerHTML="";

}else{

document.getElementById("mensagem").innerHTML=
"❌ Tente novamente.";

}

}

function verificar2(){

let resposta =
document.getElementById("valorx").value.trim();

if(resposta == "3"){

document.getElementById("passo2").style.display="none";
document.getElementById("fim").style.display="block";
document.getElementById("mensagem").innerHTML="";

}else{

document.getElementById("mensagem").innerHTML=
"❌ Confira o cálculo.";

}

}

</script>

</body>
</html>
