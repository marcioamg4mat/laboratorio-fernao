<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questão 1</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;

background:
repeating-linear-gradient(
white,
white 43px,
#dbe7ff 44px
);

color:#0b4ea2;
}

.topo{
background:#0b4ea2;
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
}

.folha{
max-width:700px;
margin:auto;
padding:20px;
}

.titulo{
text-align:center;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.subtitulo{
text-align:center;
font-size:18px;
margin-top:15px;
color:#444;
}

.equacao{
text-align:center;
font-size:72px;
margin-top:50px;
}

.botaoDica{
display:block;
margin:35px auto;
padding:12px 20px;
border:none;
background:#f3d55b;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.postit{
display:none;
background:#fff1a8;
padding:18px;
width:280px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.15);
margin-bottom:30px;
font-size:20px;
color:#333;
}

.resolucao{
margin-top:20px;
margin-left:80px;
font-size:58px;
line-height:1.8;
}

.campo{
width:120px;
height:70px;
font-size:50px;
text-align:center;
border:3px solid #7aa7ff;
border-radius:12px;
}

.verificar{
display:block;
margin-top:30px;
padding:16px 40px;
font-size:24px;
background:#0b4ea2;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
}

.resultado{
margin-top:30px;
font-size:40px;
font-weight:bold;
}

.sucesso{
display:none;
text-align:center;
margin-top:40px;
font-size:32px;
color:black;
}

.proxima{
display:none;
margin:30px auto;
padding:16px 30px;
background:#e12626;
color:white;
border:none;
border-radius:15px;
font-size:22px;
cursor:pointer;
}

@media(max-width:600px){

.equacao{
font-size:46px;
}

.resolucao{
font-size:38px;
margin-left:20px;
}

.campo{
width:90px;
height:55px;
font-size:36px;
}

}

</style>
</head>

<body>

<div class="topo">
⬅ Questão 1 de 15
</div>

<div class="folha">

<div class="titulo">
📐 Bancada 1 — Movendo Números
</div>

<div class="subtitulo">
Resolva a questão.
</div>

<div class="equacao">
x + 5 = 8
</div>

<button class="botaoDica" onclick="mostrarDica()">
💡 Dica
</button>

<div id="dica" class="postit">
💡 O número 5 está somando.<br><br>
Qual é a operação oposta?
</div>

<div class="resolucao">

<div>x + 5 = 8</div>

<div>x = 8 ( -5 )</div>

<div>x = 8 - 5</div>

<div>
x =
<input id="resposta" class="campo">
</div>

<button class="verificar" onclick="verificar()">
Verificar
</button>

</div>

<div id="sucesso" class="sucesso">

⭐ +20 pontos

<br><br>

✅ Problema resolvido

<br><br>

x = 3

<br><br>

<button class="proxima" onclick="location.href='bancada1.html'">
Próxima questão
</button>

</div>

</div>

<script>

function mostrarDica(){
document.getElementById("dica").style.display="block";
}

function verificar(){

let valor =
document.getElementById("resposta")
.value
.trim();

if(valor=="3" || valor=="+3"){

document.getElementById("sucesso")
.style.display="block";

document.querySelector(".proxima")
.style.display="block";

}
else{

alert("Tente novamente.");

}

}

</script>

</body>
</html>
