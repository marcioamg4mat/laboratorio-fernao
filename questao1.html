<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questão 1</title>

<style>

body{
margin:0;
background:#fdfdfd;
font-family:"Comic Sans MS", cursive;
background:
repeating-linear-gradient(
white,
white 39px,
#d6e4ff 40px
);
min-height:100vh;
}

.topo{
background:#003d99;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
}

.area{
padding:20px;
}

h1{
text-align:center;
color:#003d99;
}

.linha{
font-size:42px;
margin:30px 0;
color:#003d99;
text-align:center;
}

.caixa{
width:80px;
height:40px;
font-size:28px;
text-align:center;
border:2px solid #4a8cff;
border-radius:8px;
font-family:"Comic Sans MS", cursive;
}

.postit{
background:#fff2a8;
padding:15px;
border-radius:12px;
max-width:320px;
margin:20px auto;
font-size:18px;
}

.botao{
display:block;
margin:20px auto;
padding:12px 25px;
font-size:18px;
background:#003d99;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-family:"Comic Sans MS", cursive;
}

.resultado{
text-align:center;
font-size:24px;
font-weight:bold;
margin-top:20px;
}

.voltar{
display:inline-block;
margin-top:30px;
padding:12px 20px;
background:#666;
color:white;
text-decoration:none;
border-radius:10px;
}

#etapa2{
display:none;
}

#fim{
display:none;
}

</style>

</head>

<body>

<div class="topo">
⬅ Questão 1 de 15
</div>

<div class="area">

<h1>Bancada 1 - Movendo Números</h1>

<div class="linha">
x + 5 = 8
</div>

<div class="postit">
💡 O número 5 está somando.
Faça a operação oposta.
</div>

<div id="etapa1">

<div class="linha">
x = 8 (
<input id="op" class="caixa">
)
</div>

<button class="botao" onclick="verificar1()">
Verificar
</button>

</div>

<div id="etapa2">

<div class="linha">
x = 8 ( -5 )
</div>

<div class="linha">
x = 8 - 5
</div>

<div class="postit">
💡 Agora calcule o resultado.
</div>

<div class="linha">
x =
<input id="valorx" class="caixa">
</div>

<button class="botao" onclick="verificar2()">
Verificar
</button>

</div>

<div id="fim">

<div class="linha">
x = 8 ( -5 )
</div>

<div class="linha">
x = 8 - 5
</div>

<div class="linha">
x = 3
</div>

<div class="resultado">
⭐ +20 pontos
<br><br>
🏆 Questão concluída!
</div>

</div>

<div id="mensagem" class="resultado"></div>

<a href="bancada1.html" class="voltar">
⬅ Voltar
</a>

</div>

<script>

function verificar1(){

let resposta =
document.getElementById("op").value.trim();

if(Number(resposta) === -5){

document.getElementById("etapa1").style.display="none";
document.getElementById("etapa2").style.display="block";

document.getElementById("mensagem").innerHTML =
"✅ Excelente!";

}else{

document.getElementById("mensagem").innerHTML =
"❌ Pense na operação oposta.";

}

}

function verificar2(){

let resposta =
document.getElementById("valorx").value.trim();

if(Number(resposta) === 3){

document.getElementById("etapa2").style.display="none";
document.getElementById("fim").style.display="block";

document.getElementById("mensagem").innerHTML =
"";

}else{

document.getElementById("mensagem").innerHTML =
"❌ Confira o cálculo.";

}

}

</script>

</body>
</html>
