<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questão 1</title>

<style>

body{
margin:0;
font-family:Trebuchet MS,Arial,sans-serif;
background:
repeating-linear-gradient(
white,
white 39px,
#d6e4ff 40px
);
min-height:100vh;
}

.topo{
background:#003d99;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.area{
max-width:430px;
margin:auto;
padding:15px;
}

h1{
text-align:center;
color:#003d99;
margin-bottom:5px;
}

h2{
text-align:center;
color:#444;
font-size:22px;
margin-bottom:30px;
font-weight:normal;
}

.linha{
font-size:34px;
color:#003d99;
text-align:center;
margin:25px 0;
}

.caixa{
width:80px;
height:42px;
font-size:28px;
text-align:center;
border:2px solid #6ea2ff;
border-radius:8px;
}

.postit{
background:#fff2a8;
padding:12px;
border-radius:10px;
width:200px;
font-size:14px;
line-height:1.5;
margin-left:auto;
margin-right:0;
margin-top:10px;
margin-bottom:10px;
box-shadow:2px 2px 8px rgba(0,0,0,.15);
}

.botao{
display:block;
margin:20px auto;
padding:12px 25px;
background:#003d99;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.botao:hover{
background:#0b4ea2;
}

.resultado{
text-align:center;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.voltar{
display:block;
width:120px;
margin:30px auto;
text-align:center;
padding:10px;
background:#666;
color:white;
text-decoration:none;
border-radius:10px;
}

#etapa2{
display:none;
}

#fim{
display:none;
}

</style>

</head>

<body>

<div class="topo">
⬅ Questão 1 de 15
</div>

<div class="area">

<h1>📐 Bancada 1</h1>
<h2>Movendo Números</h2>

<div class="linha">
x + 5 = 8
</div>

<div class="postit">
💡 O número 5 está somando.<br>
Faça a operação oposta.
</div>

<div id="etapa1">

<div class="linha">
x = 8 (
<input id="op" class="caixa">
)
</div>

<button class="botao" onclick="verificar1()">
Verificar
</button>

</div>

<div id="etapa2">

<div class="linha">
x + 5 = 8
</div>

<div class="linha">
x = 8 ( -5 )
</div>

<div class="linha">
x = 8 - 5
</div>

<div class="postit">
💡 Agora calcule o resultado.
</div>

<div class="linha">
x =
<input id="valorx" class="caixa">
</div>

<button class="botao" onclick="verificar2()">
Verificar
</button>

</div>

<div id="fim">

<div class="linha">
x + 5 = 8
</div>

<div class="linha">
x = 8 ( -5 )
</div>

<div class="linha">
x = 8 - 5
</div>

<div class="linha">
x = 3
</div>

<div class="resultado">
⭐ +20 pontos
<br><br>
🏆 Questão concluída!
</div>

</div>

<div id="mensagem" class="resultado"></div>

<a href="bancada1.html" class="voltar">
⬅ Voltar
</a>

</div>

<script>

function verificar1(){

let resposta =
document.getElementById("op").value.trim();

if(Number(resposta) === -5){

document.getElementById("etapa1").style.display="none";
document.getElementById("etapa2").style.display="block";

document.getElementById("mensagem").innerHTML =
"";

}else{

document.getElementById("mensagem").innerHTML =
"❌ Pense na operação oposta.";

}

}

function verificar2(){

let resposta =
document.getElementById("valorx").value.trim();

if(Number(resposta) === 3){

document.getElementById("etapa2").style.display="none";
document.getElementById("fim").style.display="block";

document.getElementById("mensagem").innerHTML =
"";

}else{

document.getElementById("mensagem").innerHTML =
"❌ Confira o cálculo.";

}

}

</script>

</body>
</html>
