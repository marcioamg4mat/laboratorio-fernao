```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questão 1</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:
repeating-linear-gradient(
white,
white 39px,
#d6e4ff 40px
);
min-height:100vh;
}

.topo{
background:#003d99;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

.area{
padding:25px;
text-align:center;
}

.equacao{
font-size:52px;
color:#003d99;
margin:40px 0;
}

.caixa{
width:90px;
padding:10px;
font-size:30px;
text-align:center;
border:2px solid #8bb8ff;
border-radius:8px;
}

.botao{
margin-top:20px;
padding:14px 28px;
background:#0b4ea2;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.dica{
background:#fff4b8;
padding:15px;
margin:25px auto;
width:300px;
border-radius:10px;
font-size:16px;
}

#etapa2{
display:none;
margin-top:30px;
}

#resultado{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.voltar{
display:inline-block;
margin-top:30px;
background:#666;
color:white;
padding:12px 20px;
border-radius:10px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="topo">
⬅ Questão 1 de 15
</div>

<div class="area">

<h2>Bancada 1 - Movendo Números</h2>

<div class="equacao">
x + 5 = 8
</div>

<h3>Passo 1</h3>

<p>Qual operação deve ser aplicada para retirar o +5?</p>

<br>

<input id="op" class="caixa">

<br>

<button class="botao" onclick="verificarPasso1()">
Verificar
</button>

<div class="dica">
💡 Pense: o que está somando com x? Faça a operação oposta.
</div>

<div id="resultado"></div>

<div id="etapa2">

<h3>Passo 2</h3>

<div class="equacao">
x = 8 - 5
</div>

<p>Quanto vale x?</p>

<br>

<input id="valorx" class="caixa">

<br>

<button class="botao" onclick="verificarPasso2()">
Finalizar
</button>

</div>

<br>

<a href="bancada1.html" class="voltar">
⬅ Voltar
</a>

</div>

<script>

function verificarPasso1(){

let op=document.getElementById("op").value;

if(op=="-5"){

document.getElementById("resultado").innerHTML=
"✅ Muito bem!";

document.getElementById("etapa2").style.display="block";

}else{

document.getElementById("resultado").innerHTML=
"❌ Tente novamente.";

}

}

function verificarPasso2(){

let x=document.getElementById("valorx").value;

if(x=="3"){

document.getElementById("resultado").innerHTML=
"🏆 Questão concluída!";

}else{

document.getElementById("resultado").innerHTML=
"❌ Confira o cálculo.";

}

}

</script>

</body>
</html>
