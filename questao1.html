x =

<script>

function mostrarDica(){

document.getElementById("dica").style.display="block";

}

function verificar1(){

let resposta =
document.getElementById("op").value.trim();

if(Number(resposta) === -5){

document.getElementById("passo1").style.display="none";
document.getElementById("passo2").style.display="block";

document.getElementById("mensagem").innerHTML="";

}else{

document.getElementById("mensagem").innerHTML=
"Confira a operação oposta.";

}

}

function verificar2(){

let resposta =
document.getElementById("valorx").value.trim();

if(Number(resposta) === 3){

document.getElementById("passo2").style.display="none";
document.getElementById("fim").style.display="block";

document.getElementById("mensagem").innerHTML="";

}else{

document.getElementById("mensagem").innerHTML=
"Confira o cálculo.";

}

}

</script>
